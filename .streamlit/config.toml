[theme]
primaryColor = "#1f77b4"
backgroundColor = "#ffffff"
secondaryBackgroundColor = "#f0f2f6"
textColor = "#262730"
font = "sans serif"

[client]
showErrorDetails = true

[logger]
level = "info"

[client.toolbarMode]
toolbarMode = "auto"

[maxMessageSize]
maxMessageSize = 200

[server]
port = 8501
headless = true
runOnSave = true
enableXsrfProtection = true
enableCORS = false
